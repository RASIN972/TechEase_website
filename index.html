<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechEase — iPhone Help for Seniors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #F7F5FF;
      color: #1A1A2E;
      -webkit-font-smoothing: antialiased;
    }
    :root {
      --blue: #007AFF;
      --blue-light: #E8F0FF;
      --lavender: #F0EDFF;
      --lavender-mid: #D8D0FF;
      --pink: #FF6B9D;
      --pink-light: #FFE8F2;
      --text: #1A1A2E;
      --text-mid: #555577;
      --text-light: #8888AA;

<body>
  <div id="root"></div>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel">


const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#007AFF",
  "heroBg": "#F0EDFF",
  "headlineSize": 72,
  "showBadge": true,
  "pricingHighlight": "pro"
} /*EDITMODE-END*/;

/* ─── ICONS (inline SVG) ─── */
const Icon = ({ name, size = 24, color = "currentColor" }) => {
  const icons = {
    apple: <svg width={size} height={size} viewBox="0 0 24 24" fill={color}><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z" /></svg>,
    star: <svg width={size} height={size} viewBox="0 0 24 24" fill={color}><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" /></svg>,
    check: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12" /></svg>,
    mic: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" /><path d="M19 10v2a7 7 0 0 1-14 0v-2" /><line x1="12" y1="19" x2="12" y2="23" /><line x1="8" y1="23" x2="16" y2="23" /></svg>,
    history: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10" /><path d="M3.51 15a9 9 0 1 0 .49-4.8" /></svg>,
    bell: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" /><path d="M13.73 21a2 2 0 0 1-3.46 0" /></svg>,
    lock: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></svg>,
    speak: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" /><path d="M19.07 4.93a10 10 0 0 1 0 14.14" /><path d="M15.54 8.46a5 5 0 0 1 0 7.07" /></svg>,
    arrow: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12" /><polyline points="12 5 19 12 12 19" /></svg>,
    heart: <svg width={size} height={size} viewBox="0 0 24 24" fill={color}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" /></svg>,
    phone: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2" /><line x1="12" y1="18" x2="12.01" y2="18" /></svg>
  };
  return icons[name] || null;
};

/* ─── PHONE MOCKUP ─── */
const PhoneMockup = () =>
<div style={{
  width: 280, height: 560,
  background: '#1A1A2E',
  borderRadius: 44,
  padding: '12px 10px',
  boxShadow: '0 40px 80px rgba(0,0,0,0.25), 0 0 0 1px rgba(255,255,255,0.08)',
  position: 'relative',
  flexShrink: 0
}}>
    {/* notch */}
    <div style={{
    position: 'absolute', top: 12, left: '50%', transform: 'translateX(-50%)',
    width: 90, height: 28, background: '#1A1A2E',
    borderRadius: 20, zIndex: 10, margin: "4px"
  }} />
    {/* screen */}
    <div style={{
    width: '100%', height: '100%',
    background: '#FFFFFF',
    borderRadius: 36,
    overflow: 'hidden',
    display: 'flex', flexDirection: 'column'
  }}>
      {/* status bar */}
      <div style={{ height: 44, background: '#FAFAFA', display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', padding: '0 20px 6px', flexShrink: 0 }}>
        <span style={{ fontSize: 11, fontWeight: 600, color: '#1A1A2E' }}>9:41</span>
        <span style={{ fontSize: 10, color: '#1A1A2E', fontWeight: 600 }}>●●●</span>
      </div>
      {/* app content */}
      <div style={{ flex: 1, padding: '12px 14px 8px', display: 'flex', flexDirection: 'column', gap: 10, overflowY: 'hidden', background: '#FFFFFF' }}>
        {/* header */}
        <div style={{ fontSize: 18, fontWeight: 800, color: '#1A1A2E' }}>TechEase</div>
        <div style={{ fontSize: 11, color: '#8888AA', marginTop: -6 }}>What's your iPhone question?</div>

        {/* question bubble */}
        <div style={{
        background: '#007AFF', color: 'white', borderRadius: '14px 14px 4px 14px',
        padding: '8px 12px', fontSize: 11, fontWeight: 500, alignSelf: 'flex-end', maxWidth: '80%'
      }}>
          How do I make my text bigger?
        </div>

        {/* answer card */}
        <div style={{
        background: '#F5F5F5', borderRadius: 12,
        padding: '10px 12px', fontSize: 10, lineHeight: 1.6
      }}>
          <div style={{ fontWeight: 700, color: '#1A1A2E', marginBottom: 6, fontSize: 11 }}>Here's how to do it:</div>
          {[
        'Open the Settings app',
        'Tap "Display & Brightness"',
        'Tap "Text Size"',
        'Drag the slider to the right'].
        map((step, i) =>
        <div key={i} style={{ display: 'flex', gap: 6, marginBottom: 4, alignItems: 'flex-start' }}>
              <span style={{ color: '#007AFF', fontWeight: 700, flexShrink: 0, minWidth: 14, fontSize: 11 }}>{i + 1}.</span>
              <span style={{ color: '#333' }}>{step}</span>
            </div>
        )}
        </div>

        {/* read aloud button */}
        <button style={{
        display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 5,
        border: '1.5px solid #007AFF', borderRadius: 10, padding: '6px 10px',
        background: 'transparent', color: '#007AFF', fontSize: 10, fontWeight: 600, cursor: 'pointer'
      }}>
          <Icon name="speak" size={12} color="#007AFF" />
          Read Aloud
        </button>
      </div>

      {/* tab bar */}
      <div style={{
      height: 52, background: '#FAFAFA', borderTop: '1px solid #E0E0E0',
      display: 'flex', alignItems: 'center', justifyContent: 'space-around',
      flexShrink: 0
    }}>
        {[{ icon: 'phone', label: 'Ask', active: true }, { icon: 'history', label: 'History' }, { icon: 'bell', label: 'Tips' }].map((t) =>
      <div key={t.label} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2 }}>
            <Icon name={t.icon} size={16} color={t.active ? '#007AFF' : '#AAAAAA'} />
            <span style={{ fontSize: 8, color: t.active ? '#007AFF' : '#AAAAAA', fontWeight: 600 }}>{t.label}</span>
          </div>
      )}
      </div>
    </div>
  </div>;


/* ─── APP STORE BUTTON ─── */
const AppStoreBtn = ({ large, color = '#1A1A2E' }) =>
<a href="#download" style={{
  display: 'inline-flex', alignItems: 'center', gap: 10,
  background: color,
  color: '#fff', textDecoration: 'none',
  padding: large ? '16px 28px' : '12px 22px',
  borderRadius: 14,
  fontFamily: 'Plus Jakarta Sans, sans-serif',
  transition: 'transform 0.15s, box-shadow 0.15s',
  boxShadow: '0 4px 16px rgba(0,0,0,0.18)',
  cursor: 'pointer'
}}
onMouseEnter={(e) => {e.currentTarget.style.transform = 'translateY(-2px)';e.currentTarget.style.boxShadow = '0 8px 24px rgba(0,0,0,0.22)';}}
onMouseLeave={(e) => {e.currentTarget.style.transform = 'translateY(0)';e.currentTarget.style.boxShadow = '0 4px 16px rgba(0,0,0,0.18)';}}>
  
    <Icon name="apple" size={large ? 28 : 22} color="white" />
    <div style={{ display: 'flex', flexDirection: 'column', gap: 1 }}>
      <span style={{ fontSize: large ? 11 : 9, opacity: 0.8, fontWeight: 500, letterSpacing: '0.02em' }}>Download on the</span>
      <span style={{ fontSize: large ? 20 : 16, fontWeight: 700, letterSpacing: '-0.01em' }}>App Store</span>
    </div>
  </a>;


/* ─── NAV ─── */
const Nav = ({ tweaks }) => {
  const [scrolled, setScrolled] = React.useState(false);
  React.useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);
  return (
    <nav style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
      padding: '0 40px',
      height: 64,
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      background: scrolled ? 'rgba(247,245,255,0.92)' : 'transparent',
      backdropFilter: scrolled ? 'blur(12px)' : 'none',
      borderBottom: scrolled ? '1px solid rgba(220,210,255,0.5)' : 'none',
      transition: 'all 0.3s'
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        <div style={{
          width: 36, height: 36, borderRadius: 10,
          background: tweaks.accentColor,
          display: 'flex', alignItems: 'center', justifyContent: 'center'
        }}>
          <Icon name="phone" size={18} color="white" />
        </div>
        <span style={{ fontSize: 18, fontWeight: 800, color: '#1A1A2E', letterSpacing: '-0.02em' }}>TechEase</span>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 32 }}>
        {[
          {label:'How It Works', href:'#how-it-works'},
          {label:'Features', href:'#features'},
          {label:'Pricing', href:'#pricing'},
          {label:'Privacy', href:'privacy.html'},
          {label:'Terms', href:'terms.html'},
        ].map((item) =>
        <a key={item.label} href={item.href} style={{
          fontSize: 14, fontWeight: 600, color: '#555577', textDecoration: 'none',
          transition: 'color 0.15s'
        }}
        onMouseEnter={(e) => e.target.style.color = tweaks.accentColor}
        onMouseLeave={(e) => e.target.style.color = '#555577'}>
          {item.label}</a>
        )}
        <AppStoreBtn color={tweaks.accentColor} />
      </div>
    </nav>);

};

/* ─── HERO ─── */
const Hero = ({ tweaks }) =>
<section id="hero" style={{
  minHeight: '100vh',
  background: tweaks.heroBg,
  display: 'flex', alignItems: 'center',
  padding: '100px 40px 60px',
  position: 'relative', overflow: 'hidden'
}}>
    {/* background blobs */}
    <div style={{ position: 'absolute', width: 600, height: 600, borderRadius: '50%', background: 'radial-gradient(circle, rgba(160,130,255,0.18) 0%, transparent 70%)', top: '-10%', right: '-5%', pointerEvents: 'none' }} />
    <div style={{ position: 'absolute', width: 400, height: 400, borderRadius: '50%', background: 'radial-gradient(circle, rgba(255,107,157,0.12) 0%, transparent 70%)', bottom: '5%', left: '5%', pointerEvents: 'none' }} />

    <div style={{ maxWidth: 1200, margin: '0 auto', width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 60 }}>

      {/* left: copy */}
      <div style={{ flex: 1, maxWidth: 580 }}>
        {/* badge */}
        {tweaks.showBadge &&
      <div style={{
        display: 'inline-flex', alignItems: 'center', gap: 6,
        background: 'white', border: '1px solid #E8E4F0',
        borderRadius: 100, padding: '6px 14px 6px 8px',
        marginBottom: 32, boxShadow: '0 2px 8px rgba(0,0,0,0.06)'
      }}>
            <div style={{ background: '#FFE8F2', borderRadius: '50%', width: 22, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Icon name="heart" size={12} color="#FF6B9D" />
            </div>
            <span style={{ fontSize: 13, fontWeight: 600, color: '#555577' }}>Made just for seniors · New on the App Store</span>
          </div>
      }

        {/* headline */}
        <h1 style={{
        fontSize: tweaks.headlineSize,
        fontWeight: 800,
        color: '#1A1A2E',
        lineHeight: 1.1,
        letterSpacing: '-0.03em',
        marginBottom: 24,
        textWrap: 'balance'
      }}>
          Use Your iPhone<br />
          <span style={{ color: tweaks.accentColor }}>With Confidence.</span>
        </h1>

        {/* subheadline */}
        <p style={{
        fontSize: 22,
        lineHeight: 1.6,
        color: '#555577',
        marginBottom: 40,
        maxWidth: 460,
        fontWeight: 500
      }}>
          Ask any question. Get a clear answer.<br />
          Step by step. No confusing tech words. Ever.
        </p>

        {/* CTA group */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 20, flexWrap: 'wrap', marginBottom: 40 }}>
          <AppStoreBtn large color={tweaks.accentColor} />
          <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
            <span style={{ fontSize: 14, fontWeight: 700, color: '#1A1A2E' }}>Free to start</span>
            <span style={{ fontSize: 13, color: '#8888AA' }}>No account needed</span>
          </div>
        </div>

        {/* social proof avatars */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{ display: 'flex' }}>
            {['#C8B8FF', '#FFB8D4', '#B8E4FF', '#B8FFD4'].map((c, i) =>
          <div key={i} style={{
            width: 36, height: 36, borderRadius: '50%',
            background: c, border: '2px solid white',
            marginLeft: i > 0 ? -10 : 0,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 13, fontWeight: 700, color: 'rgba(0,0,0,0.4)'
          }}>{['M', 'J', 'P', 'D'][i]}</div>
          )}
          </div>
          <div>
            <div style={{ display: 'flex', gap: 1 }}>
              {[1, 2, 3, 4, 5].map((s) => <Icon key={s} name="star" size={14} color="#FF6B9D" />)}
            </div>
            <span style={{ fontSize: 13, color: '#8888AA', fontWeight: 500 }}>Loved by seniors everywhere</span>
          </div>
        </div>
      </div>

      {/* right: phone mockup */}
      <div style={{ position: 'relative', flexShrink: 0 }}>
        <PhoneMockup />
        {/* floating card 1 */}
        <div style={{
        position: 'absolute', top: 30, left: -100,
        background: 'white', borderRadius: 14, padding: '10px 14px',
        boxShadow: '0 8px 24px rgba(0,0,0,0.1)',
        display: 'flex', alignItems: 'center', gap: 8, minWidth: 160,
        animation: 'floatA 3s ease-in-out infinite'
      }}>
          <div style={{ width: 32, height: 32, borderRadius: 10, background: '#E8F0FF', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
            <Icon name="check" size={16} color="#007AFF" />
          </div>
          <div>
            <div style={{ fontSize: 12, fontWeight: 700, color: '#1A1A2E' }}>Clear answer!</div>
            <div style={{ fontSize: 10, color: '#8888AA' }}>In plain English</div>
          </div>
        </div>
        {/* floating card 2 */}
        <div style={{
        position: 'absolute', bottom: 80, right: -110,
        background: 'white', borderRadius: 14, padding: '10px 14px',
        boxShadow: '0 8px 24px rgba(0,0,0,0.1)',
        display: 'flex', alignItems: 'center', gap: 8, minWidth: 150,
        animation: 'floatB 3.5s ease-in-out infinite'
      }}>
          <div style={{ width: 32, height: 32, borderRadius: 10, background: '#FFE8F2', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
            <Icon name="speak" size={16} color="#FF6B9D" />

          <div>
            <div style={{ fontSize: 12, fontWeight: 700, color: '#1A1A2E' }}>Read Aloud</div>
            <div style={{ fontSize: 10, color: '#8888AA' }}>Just tap to hear it</div>
          </div>
        </div>
      </div>
    </div>
    <style>{`
      @keyframes floatA { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
      @keyframes floatB { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    `}</style>
  </section>;


/* ─── HOW IT WORKS ─── */
const HowItWorks = ({ tweaks }) => {
  const steps = [
  { num: '1', title: 'Type Your Question', desc: 'Ask anything about your iPhone. Use your own words. No tech talk needed.', color: '#E8F0FF', accent: tweaks.accentColor },
  { num: '2', title: 'Get a Clear Answer', desc: 'TechEase gives you step-by-step instructions. Short sentences. Easy words.', color: '#FFE8F2', accent: '#FF6B9D' },
  { num: '3', title: 'Follow Along Easily', desc: 'Each step is numbered. Tap "Read Aloud" and the app talks you through it.', color: '#E8FFE8', accent: '#34C759' }];

  return (
    <section id="how-it-works" style={{ padding: '100px 40px', background: '#FFFFFF' }}>
      <div style={{ maxWidth: 1100, margin: '0 auto' }}>
        <div style={{ textAlign: 'center', marginBottom: 64 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: tweaks.accentColor, letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 12 }}>Simple as 1, 2, 3</div>
          <h2 style={{ fontSize: 48, fontWeight: 800, color: '#1A1A2E', letterSpacing: '-0.03em', marginBottom: 16 }}>How It Works</h2>
          <p style={{ fontSize: 19, color: '#8888AA', fontWeight: 500, maxWidth: 500, margin: '0 auto' }}>You don't need to be good with technology. That's the whole point.</p>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 24 }}>
          {steps.map((s, i) =>
          <div key={i} style={{
            background: s.color, borderRadius: 24, padding: '36px 32px',
            position: 'relative', overflow: 'hidden'
          }}>
              <div style={{
              fontSize: 80, fontWeight: 800, color: 'rgba(0,0,0,0.06)',
              position: 'absolute', top: 10, right: 20, lineHeight: 1,
              pointerEvents: 'none', userSelect: 'none'
            }}>{s.num}</div>
              <div style={{
              width: 52, height: 52, borderRadius: 16,
              background: 'white', boxShadow: '0 4px 12px rgba(0,0,0,0.08)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              marginBottom: 20
            }}>
                <span style={{ fontSize: 24, fontWeight: 800, color: s.accent }}>{s.num}</span>
              </div>
              <h3 style={{ fontSize: 22, fontWeight: 800, color: '#1A1A2E', marginBottom: 10 }}>{s.title}</h3>
              <p style={{ fontSize: 16, color: '#555577', lineHeight: 1.65, fontWeight: 500 }}>{s.desc}</p>
            </div>
          )}
        </div>
      </div>
    </section>);

};

/* ─── FEATURES ─── */
const Features = ({ tweaks }) => {
  const features = [
  { icon: 'speak', title: 'Read It Out Loud', desc: 'One tap. The app reads the answer to you.', color: '#FFE8F2', accent: '#FF6B9D' },
  { icon: 'history', title: 'Save Your Questions', desc: 'Look back at any answer, any time. Never lose it.', color: '#E8F0FF', accent: tweaks.accentColor },
  { icon: 'bell', title: 'Daily iPhone Tips', desc: 'One small tip each morning. Learn something new every day.', color: '#FFF8E1', accent: '#F5A623' },
  { icon: 'lock', title: 'Your Privacy Is Safe', desc: 'We never sell your data. What you ask stays private.', color: '#E8FFE8', accent: '#34C759' },
  { icon: 'star', title: 'Plain English Always', desc: 'No jargon. No confusing words. We promise.', color: '#F0E8FF', accent: '#9B59B6' },
  { icon: 'heart', title: 'Made for You', desc: 'Designed for people 60 and older. Large text. Easy buttons.', color: '#FFE8F2', accent: '#FF6B9D' }];

  return (
    <section id="features" style={{ padding: '100px 40px', background: tweaks.heroBg }}>
      <div style={{ maxWidth: 1100, margin: '0 auto' }}>
